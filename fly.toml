# OpenClaw Fly.io deployment — private (Tailscale-only access)
# Based on upstream fly.private.toml template

app = "clawdbot-felix"
primary_region = "lhr"

[build]
dockerfile = "Dockerfile"

[build.args]
OPENCLAW_INSTALL_TAILSCALE = "1"

[env]
NODE_ENV = "production"
OPENCLAW_PREFER_PNPM = "1"
OPENCLAW_STATE_DIR = "/data"
NODE_OPTIONS = "--max-old-space-size=2880"

[processes]
app = "/app/scripts/fly-entrypoint.sh node dist/index.js gateway --allow-unconfigured --port 3000 --bind lan"

# No [http_service] — gateway only accessible via Tailscale VPN.
# Telegram uses outbound long polling; no inbound HTTP needed.

[[vm]]
size = "shared-cpu-2x"
memory = "4096mb"

[mounts]
source = "clawdbot_data"
destination = "/data"
